version: '3.8'

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: aerodust-shield/dashboard:latest
    container_name: aerodust_shield_dashboard
    ports:
      - "8080:8080"
    environment:
      - VITE_APP_ENV=production
      - VITE_ANALYTICS_UPDATE_INTERVAL_MS=5000
      - VITE_ENABLE_MOCK_DEMO_DATA=true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: false # Nginx requires cache writing (managed via temporary paths in config)
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
