server {
    listen 8080;
    server_name localhost;

    # Root files path
    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' https://api.cecb.cg.gov.in;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Cache Control for static assets
    location ~* \.(?:css|js)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache Control for images and media
    location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp)$ {
        expires 10d;
        access_log off;
        add_header Cache-Control "public, max-age=864000";
    }

    # SPA Routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health Check Endpoint
    location /health {
        access_log off;
        default_type text/plain;
        return 200 'OK';
    }

    # Error handling
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
